// Helper: base64 string → object URL usable by FBXLoader
function b64toURL(b64, mime='application/octet-stream'){
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
  return URL.createObjectURL(new Blob([buf],{type:mime}));
}

const initRight=new THREE.Vector3().crossVectors(initFwd,new THREE.Vector3(0,1,0)).normalize();

// ── Poyon ─────────────────────────────────────────────────────────────────────
const allPoyons=[];
class Poyon{
  constructor(index,dataIndex,variant,mood,hueOff){
    this._index=index;this._dataIndex=dataIndex;this._variant=variant;this._mood=mood;this._hOff=hueOff;
    this._seed=Math.floor(Math.random()*100000);this._isMilky=Math.random()<.05;
    this.time=0;this._ts=.5;this._firstLoop=true;this._wp=0;this._lwc=0;this._lt=performance.now();
    this._sh=null;this._dsh=null;
    this._rip=Array.from({length:5},()=>({pos:new THREE.Vector3(),time:0,active:false}));
    this._load();
  }
  async _load(){
    const data=BOUNDS[this._dataIndex];
    this._data=data;this._wp=data.frameCount;
    const exr=new EXRLoader();
    const loadEXR=url=>new Promise((ok,fail)=>{
      exr.load(url,tex=>{
        const raw=tex.image.data;let d;
        if(raw instanceof Uint16Array){d=new Float32Array(raw.length);for(let i=0;i<raw.length;i++)d[i]=decHF(raw[i]);}else d=raw;
        const t=new THREE.DataTexture(d,tex.image.width,tex.image.height,THREE.RGBAFormat,THREE.FloatType);
        t.minFilter=t.magFilter=THREE.NearestFilter;t.generateMipmaps=false;t.flipY=false;t.colorSpace=THREE.NoColorSpace;t.needsUpdate=true;
        ok(t);
      },undefined,e=>fail(e));
    });
    // Load FBX from embedded base64
    const fbxUrl=b64toURL(FBX_B64[this._dataIndex]);
    const fbx=new FBXLoader();
    const [posTex,nrmTex,_]=await Promise.all([
      loadEXR(exrURL(this._dataIndex,'pos')).catch(e=>{showErr(`<b>CORS Error loading EXR files.</b><br><br>Open a terminal in the same folder and run:<br><code>python3 server.py</code><br><br>Then visit: <a href="http://localhost:8080/poyon.html">http://localhost:8080/poyon.html</a><br><br>${e}`);return null;}),
      loadEXR(exrURL(this._dataIndex,'nrm')).catch(()=>null),
      new Promise(ok=>fbx.load(fbxUrl,obj=>{
        obj.traverse(c=>{if(!c.isMesh)return;this._geo=c.geometry.clone();const uv=this._geo.attributes.uv,vatU=new Float32Array(uv.count);for(let i=0;i<uv.count;i++)vatU[i]=uv.getX(i);this._geo.setAttribute('aVatU',new THREE.BufferAttribute(vatU,1));});ok();
      })),
    ]);
    URL.revokeObjectURL(fbxUrl);
    if(!posTex||!nrmTex||!this._geo)return;
    this._build(posTex,nrmTex);
    allPoyons.push(this);
  }
  _build(pt,nt){
    const {min,max,vertexCount,frameCount}=this._data,s=this._seed,v=(b,r)=>vry(b,r,s);
    let mat;
    if(this._index===0){
      mat=new THREE.MeshPhysicalMaterial(this._isMilky?{color:0xffffff,roughness:v(.20,.10),metalness:0,transmission:v(.45,.15),ior:v(1.52,.18),thickness:v(120,40),clearcoat:v(.55,.30),clearcoatRoughness:v(.20,.12),envMapIntensity:v(.9,.30)}:{color:0xffffff,roughness:v(.06,.05),metalness:0,transmission:v(.55,.15),ior:v(1.42,.20),thickness:v(80,30),clearcoat:v(.85,.20),clearcoatRoughness:v(.06,.06),envMapIntensity:v(1.2,.4)});
    }else if(this._index===1){
      const[c,sc]=pal(s,this._hOff,this._variant,this._mood,2);
      mat=new THREE.MeshPhysicalMaterial(this._variant===0?{color:c,roughness:v(.55,.15),metalness:v(.1,.08),sheen:v(.8,.2),sheenRoughness:v(.6,.2),sheenColor:sc,envMapIntensity:v(.6,.2)}:{color:c,roughness:v(.30,.10),metalness:v(.55,.10),clearcoat:v(.4,.2),clearcoatRoughness:v(.15,.05),envMapIntensity:v(1.2,.2)});
    }else{
      mat=new THREE.MeshPhysicalMaterial(this._variant===0?{color:0xffffff,roughness:v(.25,.15),metalness:0,clearcoat:v(.6,.3),clearcoatRoughness:v(.05,.03),envMapIntensity:v(.8,.2)}:{color:0xffffff,roughness:v(.75,.10),metalness:0,clearcoat:0,envMapIntensity:v(.4,.15)});
    }
    const vd=`uniform sampler2D uPositionTex,uNormalTex;uniform float uTime,uScale,uCursorActive;uniform vec2 uTexSize;uniform vec3 uCursorWorld,uMin,uMax;attribute float aVatU;varying vec3 vObjPos;uniform vec3 uRipplePos[5];uniform float uRippleTime[5],uRippleActive[5],uRippleSpeed;\n`;
    mat.onBeforeCompile=sh=>{
      sh.uniforms.uPositionTex={value:pt};sh.uniforms.uNormalTex={value:nt};sh.uniforms.uTime={value:2};
      sh.uniforms.uCursorWorld={value:new THREE.Vector3()};sh.uniforms.uCursorActive={value:1};
      sh.uniforms.uMin={value:new THREE.Vector3(...min)};sh.uniforms.uMax={value:new THREE.Vector3(...max)};
      sh.uniforms.uScale={value:SCALE};sh.uniforms.uTexSize={value:new THREE.Vector2(vertexCount,frameCount)};
      sh.uniforms.uRipplePos={value:Array.from({length:5},()=>new THREE.Vector3())};
      sh.uniforms.uRippleTime={value:new Float32Array(5)};sh.uniforms.uRippleActive={value:new Float32Array(5)};
      sh.uniforms.uRippleSpeed={value:12};sh.uniforms.uRippleRadius={value:window.innerWidth};
      sh.vertexShader=vd+sh.vertexShader;
      sh.vertexShader=sh.vertexShader.replace('#include <begin_vertex>',vatChunk).replace('#include <defaultnormal_vertex>',vatNormChunk).replace('#include <project_vertex>','#include <project_vertex>\nvObjPos=position;');
      if(this._index===0){
        const[c0,c1,c2]=pal(s,this._hOff,this._variant,this._mood,3);
        sh.uniforms.uColorCyan={value:c0};sh.uniforms.uColorBlue={value:c1};sh.uniforms.uColorPink={value:c2};
        sh.fragmentShader=sh.fragmentShader.replace('#include <common>',`#include <common>\n${fragPars}`).replace('#include <color_fragment>',frag0).replace('#include <emissivemap_fragment>',frag0em).replace('#include <dithering_fragment>',frag0di);
      }
      if(this._index===2){
        const[lc,dc]=pal(s,this._hOff,this._variant,this._mood,2);
        sh.uniforms.uColorLight={value:lc};sh.uniforms.uColorDeep={value:dc};sh.uniforms.uSpotSharpness={value:vry(this._variant===0?.4:.75,.15,s)};
        sh.fragmentShader=sh.fragmentShader.replace('#include <common>',`#include <common>\n${fragPars}\nuniform float uSpotSharpness;`).replace('#include <color_fragment>',frag2);
      }
      this._sh=sh;
    };
    mat.customProgramCacheKey=()=>`p${this._index}${this._variant}`;
    const mesh=new THREE.Mesh(this._geo,mat);mesh.castShadow=mesh.receiveShadow=true;
    const dm=new THREE.MeshDepthMaterial({depthPacking:THREE.RGBADepthPacking});
    dm.onBeforeCompile=sh=>{
      sh.uniforms.uPositionTex={value:pt};sh.uniforms.uTime={value:2};sh.uniforms.uTexSize={value:new THREE.Vector2(vertexCount,frameCount)};sh.uniforms.uMin={value:new THREE.Vector3(...min)};sh.uniforms.uMax={value:new THREE.Vector3(...max)};sh.uniforms.uScale={value:SCALE};
      sh.vertexShader=`uniform sampler2D uPositionTex;uniform float uTime,uScale;uniform vec2 uTexSize;uniform vec3 uMin,uMax;attribute float aVatU;\n`+sh.vertexShader;
      sh.vertexShader=sh.vertexShader.replace('#include <begin_vertex>',vatDepthChunk);this._dsh=sh;
    };dm.customProgramCacheKey=()=>`pd${this._index}`;mesh.customDepthMaterial=dm;
    scene.add(mesh);this._mesh=mesh;
  }
  setCursor(p,a){if(!this._sh)return;this._sh.uniforms.uCursorWorld.value.copy(p);this._sh.uniforms.uCursorActive.value=a;}
  addRipple(p){const s=this._rip.findIndex(r=>!r.active);if(s<0)return;this._rip[s]={pos:p.clone(),time:0,active:true};if(this._sh){this._sh.uniforms.uRipplePos.value[s].copy(p);this._sh.uniforms.uRippleTime.value[s]=0;this._sh.uniforms.uRippleActive.value[s]=1;}}
  tick(){
    if(!this._sh)return;
    const now=performance.now(),dt=(now-this._lt)/16.667;this._lt=now;
    this._rip.forEach((r,i)=>{if(!r.active)return;r.time+=1;const mx=this._sh.uniforms.uRippleRadius.value/this._sh.uniforms.uRippleSpeed.value;if(r.time>mx){r.active=false;this._sh.uniforms.uRippleActive.value[i]=0;this._sh.uniforms.uRippleTime.value[i]=0;}else this._sh.uniforms.uRippleTime.value[i]=r.time;});
    this.time+=this._ts*dt;
    if(this._firstLoop){if(this.time<0){if(this._mesh)this._mesh.visible=false;return;}if(this._mesh&&!this._mesh.visible)this._mesh.visible=true;if(this._wp>0&&this.time>=this._wp){this._firstLoop=false;this.time-=this._wp;this._lwc++;}}
    else{if(this._wp>0&&this.time>=this._wp){this.time-=this._wp;this._lwc++;}}
    this._sh.uniforms.uTime.value=this.time;if(this._dsh)this._dsh.uniforms.uTime.value=this.time;
  }
}

// ── Spawn ─────────────────────────────────────────────────────────────────────
const interval=Math.round(601/6),poyonCount=6,matOffset=Math.floor(Math.random()*2)+1;
const mA=new Array(poyonCount).fill('mid'),half=Math.ceil(poyonCount/2);
const sh=a=>{for(let k=a.length-1;k>0;k--){const j=Math.floor(Math.random()*(k+1));[a[k],a[j]]=[a[j],a[k]];}return a;};
sh(Array.from({length:half},(_,k)=>k)).forEach(i=>mA[i]='vivid');
const bk=sh(Array.from({length:poyonCount-half},(_,k)=>k+half));
mA[bk[0]]=Math.random()<(poyonCount/18)?'quiet':'soft';bk.slice(1).forEach(i=>mA[i]='mid');
const mgIdx={};
for(let i=0;i<poyonCount;i++){
  const mt=(i+matOffset)%3,gi=mgIdx[mt]=(mgIdx[mt]??0)+1,variant=(gi-1)%2;
  const p=new Poyon(mt,i%3,variant,mA[i],i/poyonCount+Math.random()*(1/poyonCount));
  p.time=-interval*i;
}

// Cylinders from embedded base64
const fbxL=new FBXLoader();
[0,1].forEach(i=>{
  const url=b64toURL(CYL_B64[i]);
  fbxL.load(url,obj=>{
    URL.revokeObjectURL(url);
    obj.scale.setScalar(SCALE);obj.position.y+=6;
    obj.traverse(c=>{if(!c.isMesh)return;c.material=new THREE.MeshStandardMaterial({color:0xF2C832,roughness:.3,metalness:.2,polygonOffset:true,polygonOffsetFactor:1,polygonOffsetUnits:1});c.castShadow=c.receiveShadow=true;});
    scene.add(obj);
  });
});

// ── Interaction ───────────────────────────────────────────────────────────────
const ray=new THREE.Raycaster();
const flPln=new THREE.Plane(new THREE.Vector3(0,1,0),0);
const cT=new THREE.Vector3(),cS=new THREE.Vector3();
let cInit=false,cActive=0,lastMv=0,touching=false;
const raw={x:window.innerWidth/2,y:window.innerHeight/2};
const ndcS={x:0,y:0},ndcR={x:0,y:0};
window.addEventListener('mousemove',e=>{raw.x=e.clientX;raw.y=e.clientY;lastMv=performance.now();ndcR.x=(e.clientX/window.innerWidth)*2-1;ndcR.y=-((e.clientY/window.innerHeight)*2-1);},{passive:true});
window.addEventListener('touchmove',e=>{raw.x=e.touches[0].clientX;raw.y=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchstart',()=>touching=true,{passive:true});
window.addEventListener('touchend',()=>touching=false,{passive:true});
const fireR=(cx,cy)=>{ray.setFromCamera({x:(cx/window.innerWidth)*2-1,y:-(cy/window.innerHeight)*2+1},camera);const pl=new THREE.Plane(new THREE.Vector3(0,0,1),0),pt=new THREE.Vector3();ray.ray.intersectPlane(pl,pt);allPoyons.forEach(p=>p.addRipple(pt));};
container.addEventListener('click',e=>fireR(e.clientX,e.clientY));
container.addEventListener('touchstart',e=>fireR(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
window.addEventListener('resize',()=>{renderer.setSize(container.clientWidth,window.innerHeight);camera.aspect=container.clientWidth/window.innerHeight;camera.updateProjectionMatrix();});

// ── Loop ──────────────────────────────────────────────────────────────────────
function loop(){
  requestAnimationFrame(loop);
  ray.setFromCamera({x:(raw.x/window.innerWidth)*2-1,y:-(raw.y/window.innerHeight)*2+1},camera);
  ray.ray.intersectPlane(flPln,cT);
  if(!cInit){cS.copy(cT);cInit=true;}cS.lerp(cT,.15);
  const isA='ontouchstart' in window?touching:(performance.now()-lastMv<100);
  cActive+=(( isA?1:0)-cActive)*(isA?.12:.05);
  ndcS.x+=(ndcR.x-ndcS.x)*.08;ndcS.y+=(ndcR.y-ndcS.y)*.08;
  const bp=initCamPos.clone();
  bp.applyAxisAngle(new THREE.Vector3(0,1,0),ndcS.x*.4);
  bp.applyAxisAngle(initRight,ndcS.y*-.3);
  camera.position.copy(bp);camera.lookAt(camTarget);
  allPoyons.forEach(p=>{p.setCursor(cS,cActive);p.tick();});
  renderer.render(scene,camera);
}
loop();
</script>
